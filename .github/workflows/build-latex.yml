name: Build LaTeX Manuscript

on:
  push:
    paths:
      - '.github/workflows/build-latex.yml'
      - 'manuscript/**'
  pull_request:
    paths:
      - '.github/workflows/build-latex.yml'
      - 'manuscript/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: latex-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdf:
    name: Compile manuscript/main.tex
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile PDF with latexmk + biber
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: manuscript
          root_file: main.tex
          latexmk_use_xelatex: false
          args: >-
            -pdf
            -interaction=nonstopmode
            -file-line-error
            -halt-on-error
            -usebiber

      - name: Validate unresolved references and citations
        working-directory: manuscript
        run: |
          set -euo pipefail
          if grep -Eq "(LaTeX Warning: There were undefined references\.|LaTeX Warning: Citation .* undefined\.|Package biblatex Warning: Please \(re\)run Biber on the file:|LaTeX Warning: Label\(s\) may have changed\.)" main.log; then
            echo "Unresolved references, citations, or bibliography rerun request detected in manuscript/main.log"
            echo "Inspect manuscript/main.log for details."
            exit 1
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdf
          path: manuscript/main.pdf
          retention-days: 90
