name: Build LaTeX Manuscript

on:
  push:
    paths:
      - 'manuscript/**'
      - '.github/workflows/build-latex.yml'
  pull_request:
    paths:
      - 'manuscript/**'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: latex-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdf:
    name: Compile manuscript/main.tex
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live dependencies
        uses: teatimeguest/setup-texlive-action@v3
        with:
          packages: |
            scheme-basic
            amsmath
            amssymb
            amsthm
            hyperref
            geometry
            cleveref
            mathtools
            thmtools
            biblatex
            biber
            xcolor
            microtype
            inputenc
            fontenc
            lm
            booktabs

      - name: Compile PDF (pass 1)
        working-directory: manuscript
        run: pdflatex -interaction=nonstopmode -file-line-error -halt-on-error main.tex

      - name: Run Biber (when bibliography control file exists)
        working-directory: manuscript
        run: |
          set -euo pipefail
          if [[ -f main.bcf ]]; then
            biber --validate-datamodel main
          else
            echo "No main.bcf found after first LaTeX pass; skipping biber."
          fi

      - name: Compile PDF (pass 2)
        working-directory: manuscript
        run: pdflatex -interaction=nonstopmode -file-line-error -halt-on-error main.tex

      - name: Compile PDF (pass 3, resolve cross-references)
        working-directory: manuscript
        run: pdflatex -interaction=nonstopmode -file-line-error -halt-on-error main.tex

      - name: Validate references and bibliography convergence
        working-directory: manuscript
        run: |
          set -euo pipefail
          if grep -Eq "(LaTeX Warning: There were undefined references\.|LaTeX Warning: Label\(s\) may have changed\.|Please \(re\)run Biber on the file:)" main.log; then
            echo "Unresolved references or bibliography rerun request detected in main.log"
            echo "Inspect manuscript/main.log for details."
            exit 1
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdf
          path: manuscript/main.pdf
          retention-days: 90
